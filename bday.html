<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Neha ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:black;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

/* stars */

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* container */

.container{
z-index:2;
max-width:700px;
}

/* name */

#name{
font-size:3em;
letter-spacing:2px;
}

/* button */

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4b7d;
color:white;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* message */

#message{
display:none;
margin-top:25px;
font-size:1.3em;
line-height:1.6em;
white-space:pre-line;
}

/* slideshow */

#slideshow{
display:none;
margin-top:30px;
}

#slideImage{
width:320px;
border-radius:15px;
box-shadow:0 0 25px rgba(255,255,255,0.6);
transition:0.8s;
}

/* floating hearts */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* fireworks */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:1;
}

</style>
</head>

<body>

<div class="container">

<h1 id="name"></h1>

<button id="surpriseBtn" onclick="showMessage()">Click for Your Surprise ❤️</button>

<div id="message"></div>

<div id="slideshow">
<img id="slideImage" src="IMG_0029.jpg">
</div>

</div>

<audio id="romanticMusic" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>

/* name typing */

const nameText="Happy Birthday My Love Neha ❤️";
let nameIndex=0;

function typeName(){
if(nameIndex<nameText.length){
document.getElementById("name").innerHTML+=nameText.charAt(nameIndex);
nameIndex++;
setTimeout(typeName,80);
}
}

typeName();

/* stars */

function createStars(){

for(let i=0;i<120;i++){

const star=document.createElement("div");
star.classList.add("star");

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

document.body.appendChild(star);

}

}

createStars();

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(10+Math.random()*30)+"px";
heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

}

setInterval(createHeart,300);

/* love letter typing */

const letter=`From the moment you came into my life,
everything became brighter.

Your smile is my favorite sight,
your voice is my favorite sound.

You are my today,
my tomorrow,
and my forever.

Happy Birthday my beautiful wife.

I love you more than words can ever say. 💕`;

let letterIndex=0;

function typeLetter(){

if(letterIndex<letter.length){

document.getElementById("message").innerHTML+=letter.charAt(letterIndex);

letterIndex++;

setTimeout(typeLetter,40);

}

}

/* slideshow */

let images=[
"IMG_0029.jpg",
"IMG_5475.jpg",
"IMG_9301.jpg"
];

let current=0;

function startSlideshow(){

setInterval(()=>{

current++;

if(current>=images.length){
current=0;
}

document.getElementById("slideImage").src=images[current];

},3000);

}

/* button click */

function showMessage(){

document.getElementById("message").style.display="block";

document.getElementById("surpriseBtn").style.display="none";

typeLetter();

heartBurst();

startFireworks();

document.getElementById("slideshow").style.display="block";

startSlideshow();

}

/* heart burst */

function heartBurst(){

for(let i=0;i<40;i++){

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";
heart.style.fontSize="26px";
heart.style.transition="all 2s ease";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.left=(50+Math.random()*40-20)+"%";
heart.style.top=(50+Math.random()*40-20)+"%";

heart.style.opacity="0";

},10);

setTimeout(()=>{heart.remove();},2000);

}

}

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function startFireworks(){

setInterval(()=>{

let x=Math.random()*canvas.width;

let y=Math.random()*canvas.height/2;

for(let i=0;i<30;i++){

let angle=Math.random()*Math.PI*2;

let radius=Math.random()*80;

ctx.beginPath();

ctx.arc(
x+Math.cos(angle)*radius,
y+Math.sin(angle)*radius,
2,
0,
Math.PI*2
);

ctx.fillStyle="white";

ctx.fill();

}

},500);

}

</script>

</body>
</html>

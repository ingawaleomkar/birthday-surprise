<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* container */

.container{
max-width:600px;
z-index:2;
}

/* intro message */

#introText{
white-space: pre-line;
font-size:1.3em;
line-height:1.7em;
color:#ffd6e7;
}

/* greeting style */
.greeting{
font-size:1.9em;
color:#ff7aa8;
font-weight:500;
text-shadow:0 0 10px rgba(255,120,160,0.6);
opacity:0;
animation:fadeGreeting 3s ease forwards;
}

/* fade animation */

@keyframes fadeGreeting{

0%{
opacity:0;
transform:translateY(15px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

button{
margin-top:25px;
padding:14px 32px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff9ec4,#ff6fa5);
color:white;
cursor:pointer;
box-shadow:0 5px 15px rgba(255,105,150,0.4);

animation:pulse 2s infinite;
transition:0.3s;
}

/* hover for desktop */

button:hover{
transform:scale(1.08);
}

/* pulse animation */

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}

}

#surpriseBtn{
opacity:0;
transform:translateY(20px);
transition:all 1.2s ease;
pointer-events:none;
}

/* visible state */

#surpriseBtn.show{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

/* loading */

#loading{
display:none;
font-size:1.8em;
}

/* romantic message */

#message{
display:none;
font-size:1.3em;
color:#ffe4a3;
line-height:1.6em;
white-space:pre-line;
}

/* slideshow */

#slideshow{
display:none;
margin-top:20px;
}

#slideImage{
width:260px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,255,255,0.6);
transition:opacity 1s ease;
opacity:1;
}

/* birthday text */

#finalWish{
display:none;
margin-top:30px;
}

.hbd{
font-family:'Poppins',sans-serif;
font-size:2.5em;
letter-spacing:2px;
color:#ffd6e7;
display:block;
}

.name{
font-family:'Great Vibes',cursive;
font-size:4.5em;
color:#ff4b7d;
text-shadow:0 0 10px #ff4b7d,0 0 25px #ff4b7d;
animation:glowName 2s infinite alternate;
}

@keyframes glowName{
from{ text-shadow:0 0 10px #ff4b7d;}
to{ text-shadow:0 0 35px #ff4b7d;}
}

#finalWish span{
opacity:0;
display:inline-block;
animation:letterGlow 0.6s forwards;
}

@keyframes letterGlow{

0%{
opacity:0;
transform:translateY(20px);
text-shadow:none;
}

100%{
opacity:1;
transform:translateY(0);
text-shadow:0 0 20px #ff4b7d,0 0 40px #ff4b7d;
}

}
/* hearts */

.heart{
position:absolute;
font-size:18px;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* fireworks canvas */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* shooting star */

.shooting-star{
position:fixed;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white,0 0 20px white;
animation:shoot 1s linear forwards;
}

@keyframes shoot{

0%{
transform:translate(0,0);
opacity:1;
}

100%{
transform:translate(-600px,300px);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<div id="intro">

<p id="introText">
<span class="greeting">Hey Neha... ❤️</span>

Today is a very special day 🎉  
And I didn’t want to just send a normal message 💌

So I made something just for you ✨

Take a deep breath... 🌸  
Smile a little 😊  

Then press the button below 👇
</p>

<button id="surpriseBtn" onclick="startSurprise()">Okay… I'm ready ❤️</button>

</div>

<div id="loading">✨ Loading your surprise... ✨</div>

<div id="message"></div>

<div id="slideshow">
<img id="slideImage" src="IMG_0029.jpg">
</div>

<div id="finalWish">
<span class="hbd">Happy Birthday</span>
<br>
<span class="name">Neha ❤️</span>
</div>

</div>

<canvas id="fireworks"></canvas>

<script>

/* start surprise */

function startSurprise(){

document.getElementById("intro").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(showMessage,2000);

}

/* short romantic message */

const text=`From the moment you came into my life,
everything became brighter.

Your smile is my favorite sight.

You are my today,
my tomorrow,
and my forever. ❤️`;

let index=0;

/* typing effect */

function typeLetter(){

if(index < text.length){

let char=text.charAt(index);

document.getElementById("message").innerHTML+=char;

index++;

let speed=80;

if(char==="\\n"){ speed=400; }

setTimeout(typeLetter,speed);

}
else{

setTimeout(()=>{

document.getElementById("finalWish").style.display="block";

animateBirthdayText();

document.getElementById("slideshow").style.display="block";

startSlideshow();

megaHeartExplosion();

startFireworks();

},1200);


}

}

/* show message */

function showMessage(){

document.getElementById("loading").style.display="none";

document.getElementById("message").style.display="block";

typeLetter();

heartBurst();

}

function megaHeartExplosion(){

for(let i=0;i<80;i++){

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";
heart.style.fontSize="30px";
heart.style.transition="all 2s ease";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.left=(50+Math.random()*80-40)+"%";
heart.style.top=(50+Math.random()*80-40)+"%";
heart.style.opacity="0";

},10);

setTimeout(()=>heart.remove(),2000);

}

}
/* slideshow */

let images=[
"IMG_0029.jpg",
"IMG_5475.jpg",
"IMG_9301.jpg"
];

let current=0;

function startSlideshow(){

setInterval(()=>{

let img=document.getElementById("slideImage");

img.style.opacity=0;

setTimeout(()=>{

current++;

if(current>=images.length) current=0;

img.src=images[current];

img.style.opacity=1;

},500);

},3500);

}

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

/* heart burst */

function heartBurst(){

for(let i=0;i<30;i++){

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";
heart.style.fontSize="24px";
heart.style.transition="all 2s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.left=(50+Math.random()*40-20)+"%";
heart.style.top=(50+Math.random()*40-20)+"%";
heart.style.opacity="0";

},10);

setTimeout(()=>heart.remove(),2000);

}

}

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function startFireworks(){

setInterval(()=>{

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height*0.6;

for(let i=0;i<40;i++){

let angle=Math.random()*Math.PI*2;
let radius=Math.random()*100;

ctx.beginPath();

ctx.arc(
x+Math.cos(angle)*radius,
y+Math.sin(angle)*radius,
2,
0,
Math.PI*2
);

ctx.fillStyle="white";
ctx.fill();

}

},600);

}

function animateBirthdayText(){

let letters=document.querySelectorAll("#finalWish span");

letters.forEach((letter,index)=>{

letter.style.animationDelay=(index*0.15)+"s";

});

}
  
/* shooting star */

function createShootingStar(){

const star=document.createElement("div");

star.classList.add("shooting-star");

star.style.top=Math.random()*window.innerHeight*0.5+"px";
star.style.left=window.innerWidth+"px";

document.body.appendChild(star);

setTimeout(()=>{ star.remove(); },1000);

}

setInterval(createShootingStar,8000);

/* SHOW BUTTON AFTER DELAY */

window.onload=function(){

setTimeout(function(){

document.getElementById("surpriseBtn").classList.add("show");

},6000);
};

</script>

</body>
</html>

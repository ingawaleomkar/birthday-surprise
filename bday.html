<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* container */

.container{
max-width:650px;
z-index:2;
}

/* intro */

#intro{
font-family:'Poppins',sans-serif;
font-size:1.4em;
line-height:1.6em;
color:#ffd6e7;
}

/* button */

button{
margin-top:25px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4b7d;
color:white;
cursor:pointer;
}

/* loading */

#loading{
display:none;
font-size:2em;
}

/* love letter */

#message{
display:none;
font-family:'Great Vibes',cursive;
font-size:2em;
color:#ffe4a3;
line-height:1.5em;
white-space:pre-line;
}

/* slideshow */

#slideshow{
display:none;
margin-top:25px;
}

#slideImage{
width:320px;
border-radius:15px;
box-shadow:0 0 25px rgba(255,255,255,0.7);
}

/* final birthday */

#finalWish{
display:none;
font-family:'Pacifico',cursive;
font-size:4.5em;
color:#ff4b7d;
margin-top:40px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #ff4b7d;
}
to{
text-shadow:
0 0 20px #ff4b7d,
0 0 40px #ff4b7d,
0 0 60px #ff4b7d;
}
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* fireworks */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<div id="intro">

<p>
Hey Neha ❤️

Today is a very special day.  
And I didn’t want to just send a normal message.

So I made something for you.

Take a deep breath...  
Smile a little 😊  

Then press the button below.
</p>

<button onclick="startSurprise()">Open Your Birthday Surprise 🎁</button>

</div>

<div id="loading">✨ Loading your surprise... ✨</div>

<div id="message"></div>

<div id="slideshow">
<img id="slideImage" src="IMG_0029.jpg">
</div>

<div id="finalWish">
HAPPY BIRTHDAY NEHA ❤️
</div>

</div>

<canvas id="fireworks"></canvas>

<script>

/* start surprise */

function startSurprise(){

document.getElementById("intro").style.display="none";
document.getElementById("loading").style.display="block";

setTimeout(showMessage,2000);

}

/* love letter */

const text=`From the moment you came into my life,
everything became brighter.

Your smile is my favorite sight,
your voice is my favorite sound.

You are my today,
my tomorrow,
and my forever.

I feel lucky every single day
to have you in my life.`;

let index=0;

function typeLetter(){

if(index < text.length){

let char = text.charAt(index);

document.getElementById("message").innerHTML += char;

index++;

let speed = 90;

if(char === "\n"){
speed = 500;   // pause after each line
}

setTimeout(typeLetter, speed);

}

}

/* show message */

function showMessage(){

document.getElementById("loading").style.display="none";

document.getElementById("message").style.display="block";

typeLetter();

heartBurst();

startFireworks();

document.getElementById("slideshow").style.display="block";

startSlideshow();

/* show final wish after delay */

setTimeout(()=>{

document.getElementById("finalWish").style.display="block";

},12000);

}

/* slideshow */

let images=[
"IMG_0029.jpg",
"IMG_5475.jpg",
"IMG_9301.jpg"
];

let current=0;

function startSlideshow(){

setInterval(()=>{

current++;

if(current>=images.length) current=0;

document.getElementById("slideImage").src=images[current];

},3000);

}

/* hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,300);

/* heart burst */

function heartBurst(){

for(let i=0;i<30;i++){

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left="50%";
heart.style.top="50%";
heart.style.fontSize="26px";
heart.style.transition="all 2s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.left=(50+Math.random()*40-20)+"%";
heart.style.top=(50+Math.random()*40-20)+"%";
heart.style.opacity="0";

},10);

setTimeout(()=>heart.remove(),2000);

}

}

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function startFireworks(){

setInterval(()=>{

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<30;i++){

let angle=Math.random()*Math.PI*2;
let radius=Math.random()*80;

ctx.beginPath();

ctx.arc(
x+Math.cos(angle)*radius,
y+Math.sin(angle)*radius,
2,
0,
Math.PI*2
);

ctx.fillStyle="white";
ctx.fill();

}

},500);

}

</script>

</body>
</html>
